services:
  - type: web
    name: komunikator
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: DEBUG
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: komunikator-db
          property: connectionString

databases:
  - name: komunikator-db
    plan: free
