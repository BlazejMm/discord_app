{% extends "base.html" %}

{% block title %}Profil - Komunikator{% endblock %}

{% block content %}
<main class="form-page">
    <section class="form-card">
        <a href="/" class="back-link">Powrot do pulpitu</a>
        <h1>Profil</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button class="primary-button w-100">Zapisz zmiany</button>
        </form>
    </section>
</main>
{% endblock %}
